name: Deploy (Staging)

on:
  push:
    branches: [develop, feature/ci-cd]
    paths-ignore:
      - "docs/**"
      - "README.md"
      - "**.md"
  workflow_dispatch:

permissions:
  contents: read

env:
  AWS_REGION: eu-west-1
  ENV: staging
  TF_DIR: devops/terraform/environments/staging

jobs:
  terraform:
    name: Terraform Init/Plan/Apply
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      TF_VAR_db_username: ${{ secrets.TF_VAR_DB_USERNAME }}
      TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
      TF_VAR_jwt_secret: ${{ secrets.TF_VAR_JWT_SECRET }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init

      - name: Terraform Validate
        working-directory: ${{ env.TF_DIR }}
        run: terraform validate

      - name: Terraform Plan
        working-directory: ${{ env.TF_DIR }}
        run: terraform plan -out=tfplan -lock=false

      - name: Terraform Apply
        working-directory: ${{ env.TF_DIR }}
        run: terraform apply -auto-approve -lock=false tfplan

  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    needs: terraform
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        include:
          - context: ./backend
            service: backend
          - context: ./frontend
            service: frontend
          - context: ./data-engineering
            service: data-engineering

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com
          SERVICE: quickpoll/${{ matrix.service }}
          SHA: ${{ github.sha }}
        run: |
          docker build \
            -t "$REGISTRY/$SERVICE:$SHA" \
            -t "$REGISTRY/$SERVICE:${ENV}" \
            ${{ matrix.context }}

          docker push "$REGISTRY/$SERVICE:$SHA"
          docker push "$REGISTRY/$SERVICE:${ENV}"

  deploy:
    name: Deploy to ECS (Staging)
    runs-on: ubuntu-latest
    needs: build-and-push
    timeout-minutes: 20

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Force new deployment - backend
        run: |
          aws ecs update-service \
            --cluster "quickpoll-${ENV}-cluster" \
            --service "quickpoll-${ENV}-backend" \
            --force-new-deployment \
            --no-cli-pager

      - name: Force new deployment - frontend
        run: |
          aws ecs update-service \
            --cluster "quickpoll-${ENV}-cluster" \
            --service "quickpoll-${ENV}-frontend" \
            --force-new-deployment \
            --no-cli-pager

      - name: Wait for backend to stabilize (max 3m)
        run: |
          set -euo pipefail
          CLUSTER="quickpoll-${ENV}-cluster"
          SERVICE="quickpoll-${ENV}-backend"
          MAX_SECONDS=180
          INTERVAL=15
          END=$((SECONDS+MAX_SECONDS))

          while true; do
            DESIRED=$(aws ecs describe-services --cluster "$CLUSTER" --services "$SERVICE" --query "services[0].desiredCount" --output text)
            RUNNING=$(aws ecs describe-services --cluster "$CLUSTER" --services "$SERVICE" --query "services[0].runningCount" --output text)
            PRIMARY_STATE=$(aws ecs describe-services --cluster "$CLUSTER" --services "$SERVICE" --query "services[0].deployments[?status=='PRIMARY'].rolloutState" --output text)

            echo "backend: desired=$DESIRED running=$RUNNING rolloutState=$PRIMARY_STATE"

            if [[ "$PRIMARY_STATE" == "COMPLETED" && "$RUNNING" == "$DESIRED" ]]; then
              echo "backend is stable"
              break
            fi

            if [[ $SECONDS -ge $END ]]; then
              echo "::error::backend did not stabilize within ${MAX_SECONDS}s"
              aws ecs describe-services --cluster "$CLUSTER" --services "$SERVICE" --query "services[0].events[0:5].message" --output table || true
              aws ecs list-tasks --cluster "$CLUSTER" --service-name "$SERVICE" --output text || true
              exit 1
            fi

            sleep "$INTERVAL"
          done

      - name: Wait for frontend to stabilize (max 3m)
        run: |
          set -euo pipefail
          CLUSTER="quickpoll-${ENV}-cluster"
          SERVICE="quickpoll-${ENV}-frontend"
          MAX_SECONDS=180
          INTERVAL=15
          END=$((SECONDS+MAX_SECONDS))

          while true; do
            DESIRED=$(aws ecs describe-services --cluster "$CLUSTER" --services "$SERVICE" --query "services[0].desiredCount" --output text)
            RUNNING=$(aws ecs describe-services --cluster "$CLUSTER" --services "$SERVICE" --query "services[0].runningCount" --output text)
            PRIMARY_STATE=$(aws ecs describe-services --cluster "$CLUSTER" --services "$SERVICE" --query "services[0].deployments[?status=='PRIMARY'].rolloutState" --output text)

            echo "frontend: desired=$DESIRED running=$RUNNING rolloutState=$PRIMARY_STATE"

            if [[ "$PRIMARY_STATE" == "COMPLETED" && "$RUNNING" == "$DESIRED" ]]; then
              echo "frontend is stable"
              break
            fi

            if [[ $SECONDS -ge $END ]]; then
              echo "::error::frontend did not stabilize within ${MAX_SECONDS}s"
              aws ecs describe-services --cluster "$CLUSTER" --services "$SERVICE" --query "services[0].events[0:5].message" --output table || true
              aws ecs list-tasks --cluster "$CLUSTER" --service-name "$SERVICE" --output text || true
              exit 1
            fi

            sleep "$INTERVAL"
          done
