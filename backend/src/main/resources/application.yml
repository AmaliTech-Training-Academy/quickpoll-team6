spring:
  application:
    name: quickpoll
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    # Enable JDBC batching at the driver level
    properties:
      reWriteBatchedInserts: true
    hikari:
        maximum-pool-size: 10
        minimum-idle: 5
        idle-timeout: 30000
        connection-timeout: 20000
        max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    show-sql: true
    properties:
      hibernate:
        format_sql: false
        # Enable Hibernate batching to group INSERT statements
        order_inserts: true
        order_updates: true
        jdbc:
          batch_size: 50
  sql:
    init:
      mode: always
      continue-on-error: true

server:
  port: 8080
  servlet:
    context-path: /api

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

management:                     # ← moved to root level
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      enabled: true             # ← fixed from "enabled=true:"