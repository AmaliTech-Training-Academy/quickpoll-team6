name: API Test Automation CI

# Run API CI only when backend or QA files change.
on:
  push:
    branches: [develop]
    paths:
      - backend/**
      - qa/**
      - .github/workflows/api-test-ci.yml
  pull_request:
    branches: [develop, fix/api-ci]
    paths:
      - backend/**
      - qa/**
      - .github/workflows/api-test-ci.yml
  workflow_dispatch:

jobs:
  # Main job: compile, test, summarize, email, and explicitly fail when any test fails.
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: qa/api-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean compile

      - name: Run tests
        id: maven_test
        run: mvn test
        # Keep pipeline moving so email/reporting still run.
        continue-on-error: true

      - name: Test summary (readable logs)
        id: test_summary
        if: always()
        run: |
          python3 - <<'PY'
          import glob
          import os
          import re
          import xml.etree.ElementTree as ET

          files = glob.glob("target/surefire-reports/TEST-*.xml")
          total = failed = errors = skipped = 0
          failed_tests = []
          output_path = os.environ.get("GITHUB_OUTPUT")

          def set_output(name, value):
              if output_path:
                  with open(output_path, "a", encoding="utf-8") as out:
                      out.write(f"{name}={value}\\n")

          if not files:
              set_output("tests_failed", "true")
              print("No Surefire XML reports found in target/surefire-reports.")
              raise SystemExit(0)

          for report in files:
              root = ET.parse(report).getroot()
              total += int(root.attrib.get("tests", 0))
              failed += int(root.attrib.get("failures", 0))
              errors += int(root.attrib.get("errors", 0))
              skipped += int(root.attrib.get("skipped", 0))

              for tc in root.findall("testcase"):
                  name = tc.attrib.get("name", "unknown")
                  for node in (tc.find("failure"), tc.find("error")):
                      if node is not None:
                          msg = (node.attrib.get("message") or "").strip()
                          msg = msg.replace("failures)", "reasons)")
                          msg = re.sub(r"org\\.opentest4j\\.AssertionFailedError: ", "", msg)
                          short = "\\n".join(msg.splitlines()[:6])
                          if len(msg.splitlines()) > 6:
                              short += "\\n  ..."
                          failed_tests.append((name, short))

          passed = total - failed - errors - skipped
          has_failures = failed > 0 or errors > 0
          set_output("tests_failed", "true" if has_failures else "false")

          print("==================================")
          print("API TEST SUMMARY")
          print("==================================")
          print(f"Total: {total} | Passed: {passed} | Failed: {failed} | Errors: {errors} | Skipped: {skipped}")
          if failed_tests:
              print("Failed tests:")
              for (name, reason) in failed_tests[:15]:
                  print(f"  - {name}")
                  print("    " + reason.replace("\\n", "\\n    "))
          print("==================================")
          PY

      - name: Build email body
        if: always()
        run: |
          python3 - <<'PY'
          import glob, os, re, html as h
          import xml.etree.ElementTree as ET

          files = glob.glob("target/surefire-reports/TEST-*.xml")
          total = failed = errors = skipped = 0
          failed_items = []

          repo   = os.environ.get("GITHUB_REPOSITORY", "")
          branch = os.environ.get("GITHUB_REF_NAME", "")
          server = os.environ.get("GITHUB_SERVER_URL", "https://github.com")
          run_id = os.environ.get("GITHUB_RUN_ID", "")
          run_url   = f"{server}/{repo}/actions/runs/{run_id}"
          repo_name  = repo.split("/")[-1] if "/" in repo else repo
          repo_owner = os.environ.get("GITHUB_REPOSITORY_OWNER", repo.split("/")[0] if "/" in repo else "")
          pages_url  = f"https://{repo_owner}.github.io/{repo_name}/index.html"

          # -- Parse Surefire reports --
          for report in files:
              root = ET.parse(report).getroot()
              total   += int(root.attrib.get("tests", 0))
              failed  += int(root.attrib.get("failures", 0))
              errors  += int(root.attrib.get("errors", 0))
              skipped += int(root.attrib.get("skipped", 0))
              for tc in root.findall("testcase"):
                  name = tc.attrib.get("name", "unknown")
                  cls  = tc.attrib.get("classname", "").rsplit(".", 1)[-1]
                  for node in (tc.find("failure"), tc.find("error")):
                      if node is not None:
                          msg = (node.attrib.get("message") or "").strip()
                          msg = re.sub(r"org\.opentest4j\.\w+:\s*", "", msg)
                          short = "\n".join(msg.splitlines()[:3])
                          if len(msg.splitlines()) > 3:
                              short += "\n..."
                          failed_items.append((cls, name, short))

          passed = total - failed - errors - skipped
          is_pass = failed == 0 and errors == 0 and total > 0
          status_label = "PASSED" if is_pass else "FAILED"
          status_color = "#2e7d32" if is_pass else "#c62828"
          badge_bg     = "#e8f5e9" if is_pass else "#ffebee"

          # -- Build HTML email --
          rows = ""
          for i, (cls, name, reason) in enumerate(failed_items[:12]):
              bg = "#fff" if i % 2 == 0 else "#f9f9f9"
              reason_escaped = h.escape(reason).replace("\n", "<br>")
              rows += (
                  f'<tr style="background:{bg}">'
                  f'<td style="padding:8px 12px;border-bottom:1px solid #e0e0e0;font-family:monospace;font-size:13px">{h.escape(cls)}</td>'
                  f'<td style="padding:8px 12px;border-bottom:1px solid #e0e0e0;font-family:monospace;font-size:13px">{h.escape(name)}</td>'
                  f'<td style="padding:8px 12px;border-bottom:1px solid #e0e0e0;font-size:12px;color:#555">{reason_escaped}</td>'
                  f'</tr>'
              )

          failed_section = ""
          if rows:
              overflow = len(failed_items) - 12
              note = f'<p style="color:#888;font-size:12px">...and {overflow} more</p>' if overflow > 0 else ""
              failed_section = f"""
              <h3 style="color:#c62828;margin:24px 0 8px">Failed Tests</h3>
              <table style="width:100%;border-collapse:collapse;border:1px solid #e0e0e0">
                <thead>
                  <tr style="background:#f5f5f5">
                    <th style="padding:8px 12px;text-align:left;border-bottom:2px solid #ccc">Class</th>
                    <th style="padding:8px 12px;text-align:left;border-bottom:2px solid #ccc">Test</th>
                    <th style="padding:8px 12px;text-align:left;border-bottom:2px solid #ccc">Reason</th>
                  </tr>
                </thead>
                <tbody>{rows}</tbody>
              </table>
              {note}"""

          no_reports_msg = ""
          if not files:
              no_reports_msg = '<p style="color:#c62828;font-weight:bold">No Surefire XML reports were generated.</p>'

          email_html = f"""<!DOCTYPE html>
          <html><head><meta charset="utf-8"></head>
          <body style="margin:0;padding:0;font-family:Segoe UI,Helvetica,Arial,sans-serif;color:#333;background:#f4f4f4">
            <div style="max-width:700px;margin:20px auto;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.08)">

              <!-- Header -->
              <div style="background:#1a237e;padding:24px 32px">
                <h1 style="margin:0;color:#fff;font-size:22px">QuickPoll API Test Report</h1>
                <p style="margin:6px 0 0;color:#b0bec5;font-size:13px">{h.escape(repo)} &middot; {h.escape(branch)}</p>
              </div>

              <!-- Status badge -->
              <div style="padding:24px 32px 0">
                <span style="display:inline-block;padding:6px 18px;border-radius:4px;font-weight:bold;font-size:15px;color:{status_color};background:{badge_bg}">
                  {status_label}
                </span>
              </div>

              <!-- Summary table -->
              <div style="padding:16px 32px">
                <table style="border-collapse:collapse;margin:12px 0">
                  <tr><td style="padding:4px 16px 4px 0;font-weight:600">Total</td><td>{total}</td></tr>
                  <tr><td style="padding:4px 16px 4px 0;font-weight:600;color:#2e7d32">Passed</td><td>{passed}</td></tr>
                  <tr><td style="padding:4px 16px 4px 0;font-weight:600;color:#c62828">Failed</td><td>{failed}</td></tr>
                  <tr><td style="padding:4px 16px 4px 0;font-weight:600;color:#e65100">Errors</td><td>{errors}</td></tr>
                  <tr><td style="padding:4px 16px 4px 0;font-weight:600;color:#757575">Skipped</td><td>{skipped}</td></tr>
                </table>
                {no_reports_msg}
              </div>

              <!-- Failed tests -->
              <div style="padding:0 32px">{failed_section}</div>

              <!-- Links -->
              <div style="padding:20px 32px 28px;border-top:1px solid #eee;margin-top:16px">
                <p style="margin:0 0 6px"><strong>Allure Report:</strong>
                  <a href="{pages_url}" style="color:#1565c0">{pages_url}</a>
                </p>
                <p style="margin:0"><strong>Workflow Run:</strong>
                  <a href="{run_url}" style="color:#1565c0">View on GitHub</a>
                </p>
              </div>

              <!-- Footer -->
              <div style="background:#f5f5f5;padding:14px 32px;font-size:11px;color:#999;text-align:center">
                Sent automatically by GitHub Actions
              </div>
            </div>
          </body></html>"""

          with open("email_body.html", "w", encoding="utf-8") as out:
              out.write(email_html)
          PY

      - name: Sanity check email body
        if: always()
        run: |
          if [ ! -f "email_body.html" ]; then
            echo "::error::email_body.html was not generated in qa/api-tests."
            ls -la
            exit 1
          fi

      - name: Send email report
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "QuickPoll API Tests \u2014 ${{ steps.test_summary.outputs.tests_failed == 'true' && 'FAILED' || 'PASSED' }} \u2014 ${{ github.ref_name }}"
          to: ${{ secrets.EMAIL_TO }}
          from: yoshninjas.1@gmail.com
          secure: false
          content_type: text/html
          html_body: file://${{ github.workspace }}/qa/api-tests/email_body.html

      - name: Print Surefire reports (on failure)
        if: always() && steps.test_summary.outputs.tests_failed == 'true'
        run: |
          ls -la target/surefire-reports || true
          for f in target/surefire-reports/*.txt; do [ -f "$f" ] && cat "$f"; done

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: qa/api-tests/target/allure-results/
          retention-days: 30

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: qa/api-tests/target/surefire-reports/
          retention-days: 30

      - name: Fail job when any test fails
        if: always() && (steps.maven_test.outcome == 'failure' || steps.test_summary.outputs.tests_failed == 'true')
        run: |
          echo "At least one test failed (or reports were missing)."
          exit 1

  # Always attempt report publishing for visibility.
  allure-report:
    runs-on: ubuntu-latest
    needs: test
    if: always()
    permissions:
      contents: write
    defaults:
      run:
        working-directory: qa/api-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: qa/api-tests/target/allure-results

      - name: Load test report history
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: qa/api-tests/gh-pages
        continue-on-error: true

      - name: Copy history to allure-results
        run: |
          mkdir -p target/allure-results/history
          if [ -d "gh-pages/history" ]; then
            cp -r gh-pages/history/* target/allure-results/history/ 2>/dev/null || true
          fi

      - name: Verify Allure results
        run: |
          if [ ! -d "target/allure-results" ]; then
            echo "::error::target/allure-results not found."
            exit 1
          fi
          n_result=$(find target/allure-results -maxdepth 1 -type f -name "*-result.json" 2>/dev/null | wc -l)
          n_container=$(find target/allure-results -maxdepth 1 -type f -name "*-container.json" 2>/dev/null | wc -l)
          total=$((n_result + n_container))
          if [ "$total" -eq 0 ]; then
            echo "::error::No Allure result/container JSON in target/allure-results."
            ls -la target/allure-results
            exit 1
          fi
          echo "Allure results: $total file(s)."

      - name: Generate Allure report
        run: mvn allure:report

      - name: Prepare report for GitHub Pages
        run: |
          mkdir -p allure-report-final
          if [ -d "target/site/allure-maven-plugin" ]; then
            cp -r target/site/allure-maven-plugin/* allure-report-final/
            echo "Copied from target/site/allure-maven-plugin"
          elif [ -d "target/allure-report" ]; then
            cp -r target/allure-report/* allure-report-final/
            echo "Copied from target/allure-report"
          else
            echo "::error::No Allure report directory found."
            ls -la target/
            ls -la target/site/ || true
            exit 1
          fi
          # Prevent GitHub Pages/Jekyll from dropping report assets.
          touch allure-report-final/.nojekyll
          ls -la allure-report-final/

      - name: Publish Allure report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: qa/api-tests/allure-report-final
          force_orphan: true

      - name: Upload Allure report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: qa/api-tests/allure-report-final/
          retention-days: 30
