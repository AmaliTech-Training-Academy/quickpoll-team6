services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: qp-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: qp-kafka
    depends_on:
      - zookeeper
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 5

  backend:
    build: ./backend
    container_name: quickpoll-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      JWT_SECRET: ${JWT_SECRET:-Z29vZC1zZWNyZXQta2V5LWZvcg}

  data-pipeline:
    build: ./data-engineering
    container_name: qp-data-pipeline
    env_file:
      - ./data-engineering/.env.data-pipeline
    depends_on:
      kafka:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: quickpoll-frontend
    ports:
      - "4200:8080"
    depends_on:
      - backend
