name: CI

on:
  push:
    branches: [main, develop, feature/ci-cd]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ──────────────────────────────────────────────────────────────
# Backend — Java 21 / Spring Boot / PostgreSQL
# ──────────────────────────────────────────────────────────────

jobs:
  backend:
    name: Backend — Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: quickpoll
          POSTGRES_USER: quickpoll
          POSTGRES_PASSWORD: quickpoll123
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U quickpoll"
          --health-interval 10s
          --health-timeout  5s
          --health-retries  5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Build
        working-directory: ./backend
        run: mvn clean package -DskipTests -B

      - name: Run tests
        working-directory: ./backend
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/quickpoll
          SPRING_DATASOURCE_USERNAME: quickpoll
          SPRING_DATASOURCE_PASSWORD: quickpoll123
          JWT_SECRET: ci-test-secret-key-for-testing-only
        run: mvn verify -B

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: backend/target/surefire-reports/
          retention-days: 7

  # ──────────────────────────────────────────────────────────
  # Frontend — Angular 19 / Node 18
  # ──────────────────────────────────────────────────────────

  frontend:
    name: Frontend — Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build
        working-directory: ./frontend
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/
          retention-days: 7

  # ──────────────────────────────────────────────────────────
  # Data Engineering — Python 3.11
  # ──────────────────────────────────────────────────────────

  data-engineering:
    name: Data Engineering — Lint & Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: data-engineering/requirements.txt

      - name: Install dependencies
        working-directory: ./data-engineering
        run: pip install -r requirements.txt

      - name: Validate syntax
        working-directory: ./data-engineering
        run: python -m py_compile etl_pipeline.py

  # ──────────────────────────────────────────────────────────
  # Docker Compose — Integration smoke test
  # ──────────────────────────────────────────────────────────

  docker-build:
    name: Docker — Compose Build
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build all containers
        run: docker compose build

      - name: Start stack
        run: docker compose up -d

      - name: Wait for backend health
        run: |
          echo "Waiting for backend to be ready..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/actuator/health > /dev/null 2>&1; then
              echo "Backend is healthy."
              exit 0
            fi
            sleep 5
          done
          echo "Backend did not become healthy in time."
          docker compose logs backend
          exit 1

      - name: Tear down
        if: always()
        run: docker compose down -v
