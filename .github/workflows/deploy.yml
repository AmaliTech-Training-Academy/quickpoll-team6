# ──────────────────────────────────────────────────────────────
# QuickPoll — Deployment
# ──────────────────────────────────────────────────────────────
# Triggered only on pushes to main (after PR merge).
# Builds Docker images, pushes to GitHub Container Registry,
# and deploys.
# ──────────────────────────────────────────────────────────────

name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/quickpoll

jobs:

  # ──────────────────────────────────────────────────────────
  # Build & Push Docker Images to GHCR
  # ──────────────────────────────────────────────────────────

  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - context: ./backend
            image: backend
          - context: ./frontend
            image: frontend
          - context: ./data-engineering
            image: data-engineering

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.image }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ──────────────────────────────────────────────────────────
  # Deploy to Environment
  # ──────────────────────────────────────────────────────────

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy
        run: |
          echo "==========================================="
          echo " QuickPoll — Deployment"
          echo "==========================================="
          echo ""
          echo " Images pushed to GHCR:"
          echo "   ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:latest"
          echo "   ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:latest"
          echo "   ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-data-engineering:latest"
          echo ""
          echo " Commit: ${{ github.sha }}"
          echo " Branch: ${{ github.ref_name }}"
          echo "==========================================="
          # ─────────────────────────────────────────────
          # Add your deployment commands here, e.g.:
          #
          #   ssh ${{ secrets.DEPLOY_HOST }} << 'DEPLOY'
          #     cd /opt/quickpoll
          #     docker compose pull
          #     docker compose up -d
          #   DEPLOY
          # ─────────────────────────────────────────────
