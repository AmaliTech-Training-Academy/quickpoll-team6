services:
  postgres:
    image: postgres:17
    container_name: qp-postgres
    environment:
      POSTGRES_DB: quickpoll
      POSTGRES_USER: quickpoll
      POSTGRES_PASSWORD: quickpoll123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quickpoll -d quickpoll"]
      interval: 10s
      timeout: 5s
      retries: 10

  data-pipeline:
    build: .
    container_name: qp-data-pipeline
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./.env
    environment:
      # Container-internal service discovery (do not use localhost inside containers)
      DB_HOST: postgres
      DB_PORT: "5432"

volumes:
  pgdata:
