name: SAST

on:
  push:
    branches: [main, develop, feature/*]
    paths-ignore:
      - "docs/**"
      - "README.md"
      - "**/*.md"
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - "docs/**"
      - "README.md"
      - "**/*.md"

permissions:
  contents: read
  security-events: write

concurrency:
  group: sast-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [java, javascript, python]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-extended

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"

  trivy-fs:
    name: Trivy - Filesystem & IaC Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Trivy filesystem scan
        run: |
          trivy fs . \
            --format sarif \
            --output ${{ github.workspace }}/trivy-fs.sarif \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --scanners vuln,misconfig,secret \
            --exit-code 0

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-fs.sarif') != ''
        with:
          sarif_file: ${{ github.workspace }}/trivy-fs.sarif
          category: trivy-fs

      - name: Upload Trivy report as artifact
        uses: actions/upload-artifact@v4
        if: always() && hashFiles('trivy-fs.sarif') != ''
        with:
          name: trivy-fs-report
          path: ${{ github.workspace }}/trivy-fs.sarif
          retention-days: 30

  trufflehog:
    name: TruffleHog - Secrets Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog secrets scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: .
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified