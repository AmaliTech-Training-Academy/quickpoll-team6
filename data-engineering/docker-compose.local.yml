services:
  postgres:
    image: postgres:17
    container_name: qp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: quickpoll
      POSTGRES_USER: quickpoll
      POSTGRES_PASSWORD: quickpoll123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quickpoll -d quickpoll"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ../backend
    container_name: quickpoll-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/quickpoll
      DB_USERNAME: quickpoll
      DB_PASSWORD: quickpoll123
      JWT_SECRET: local-dev-jwt-secret-change-me
      JWT_EXPIRATION: "86400000"
    ports:
      - "8080:8080"

  data-pipeline:
    build:
      context: .
    container_name: qp-data-pipeline
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ENVIRONMENT: local-dev
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: quickpoll
      DB_USER: quickpoll
      DB_PASSWORD: quickpoll123
      LOG_LEVEL: ${LOG_LEVEL:-DEBUG}
      DLQ_DIR: ${DLQ_DIR:-data/dlq}
      BACKFILL_INTERVAL_MINUTES: ${BACKFILL_INTERVAL_MINUTES:-30}
      WATERMARK_OVERLAP_MINUTES: ${WATERMARK_OVERLAP_MINUTES:-5}
      FORCE_FULL_BACKFILL: ${FORCE_FULL_BACKFILL:-false}
    volumes:
      - ./data:/app/data

  frontend:
    build:
      context: ..
      dockerfile: data-engineering/docker/frontend.local.Dockerfile
      args:
        API_BASE_URL: ${FRONTEND_API_BASE_URL:-https://nonmoral-zachariah-unindignant.ngrok-free.dev/api}
    container_name: quickpoll-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "4200:8080"

volumes:
  pgdata:
