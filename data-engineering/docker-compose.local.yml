services:
  postgres:
    image: postgres:17
    container_name: qp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: quickpoll
      POSTGRES_USER: quickpoll
      POSTGRES_PASSWORD: quickpoll123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quickpoll -d quickpoll"]
      interval: 10s
      timeout: 5s
      retries: 10

  data-pipeline:
    build: .
    container_name: qp-data-pipeline
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ENVIRONMENT: local-dev
      # Force the local stack to stay self-contained even if .env contains
      # staging credentials for a shared remote database.
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: quickpoll
      DB_USER: quickpoll
      DB_PASSWORD: quickpoll123
      LOG_LEVEL: ${LOG_LEVEL:-DEBUG}
      DLQ_DIR: ${DLQ_DIR:-data/dlq}
      BACKFILL_INTERVAL_MINUTES: ${BACKFILL_INTERVAL_MINUTES:-30}
      WATERMARK_OVERLAP_MINUTES: ${WATERMARK_OVERLAP_MINUTES:-5}
      FORCE_FULL_BACKFILL: ${FORCE_FULL_BACKFILL:-false}
    volumes:
      - ./data:/app/data

volumes:
  pgdata:
