# Consolidated local stack: Postgres, Kafka, Backend, Data-Engineering Pipeline
# Usage: docker compose -f docker-compose.local.yml up -d

services:
  postgres:
    image: postgres:17
    container_name: qp-postgres
    environment:
      POSTGRES_DB: quickpoll
      POSTGRES_USER: quickpoll
      POSTGRES_PASSWORD: quickpoll123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./data-engineering/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quickpoll -d quickpoll"]
      interval: 10s
      timeout: 5s
      retries: 10

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: qp-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: qp-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 5

  backend:
    build: ./backend
    container_name: quickpoll-backend
    ports:
      - "8080:8080"
    env_file:
      - ./backend/.env
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/quickpoll
      DB_USERNAME: quickpoll
      DB_PASSWORD: quickpoll123
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC_VOTE_EVENTS: vote_events
      KAFKA_TOPIC_POLL_EVENTS: poll_events
      JWT_SECRET: ${JWT_SECRET:-local-dev-secret-key-for-testing-min-32-chars}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  data-pipeline:
    build: ./data-engineering
    container_name: qp-data-pipeline
    env_file:
      - ./data-engineering/.env
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

volumes:
  pgdata: