name: SAST

on:
  push:
    branches: [main, develop, feature/*]
    paths-ignore:
      - "docs/**"
      - "README.md"
      - "**/*.md"
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - "docs/**"
      - "README.md"
      - "**/*.md"

permissions:
  contents: read
  security-events: write

concurrency:
  group: sast-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [java, javascript, python]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-extended

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"

  trivy-fs:
    name: Trivy - Filesystem & IaC Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Trivy filesystem scan
        run: |
          trivy fs . \
            --format sarif \
            --output ${{ github.workspace }}/trivy-fs.sarif \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --scanners vuln,misconfig,secret \
            --exit-code 0

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-fs.sarif') != ''
        with:
          sarif_file: ${{ github.workspace }}/trivy-fs.sarif
          category: trivy-fs

      - name: Upload Trivy report as artifact
        uses: actions/upload-artifact@v4
        if: always() && hashFiles('trivy-fs.sarif') != ''
        with:
          name: trivy-fs-report
          path: ${{ github.workspace }}/trivy-fs.sarif
          retention-days: 30

  trivy-image-backend:
    name: Trivy - Image Scan (Backend)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          load: true
          tags: quickpoll-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Trivy
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Trivy image scan (backend)
        run: |
          trivy image quickpoll-backend:ci \
            --format sarif \
            --output ${{ github.workspace }}/trivy-backend.sarif \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --exit-code 0

      - name: Upload Trivy SARIF (backend)
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-backend.sarif') != ''
        with:
          sarif_file: ${{ github.workspace }}/trivy-backend.sarif
          category: trivy-image-backend

      - name: Upload Trivy report as artifact (backend)
        uses: actions/upload-artifact@v4
        if: always() && hashFiles('trivy-backend.sarif') != ''
        with:
          name: trivy-backend-report
          path: ${{ github.workspace }}/trivy-backend.sarif
          retention-days: 30

  trivy-image-frontend:
    name: Trivy - Image Scan (Frontend)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          load: true
          tags: quickpoll-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Trivy
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Trivy image scan (frontend)
        run: |
          trivy image quickpoll-frontend:ci \
            --format sarif \
            --output ${{ github.workspace }}/trivy-frontend.sarif \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --exit-code 0

      - name: Upload Trivy SARIF (frontend)
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-frontend.sarif') != ''
        with:
          sarif_file: ${{ github.workspace }}/trivy-frontend.sarif
          category: trivy-image-frontend

      - name: Upload Trivy report as artifact (frontend)
        uses: actions/upload-artifact@v4
        if: always() && hashFiles('trivy-frontend.sarif') != ''
        with:
          name: trivy-frontend-report
          path: ${{ github.workspace }}/trivy-frontend.sarif
          retention-days: 30

  trivy-image-data-engineering:
    name: Trivy - Image Scan (Data Engineering)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build data-engineering image
        uses: docker/build-push-action@v5
        with:
          context: ./data-engineering
          file: ./data-engineering/Dockerfile
          load: true
          tags: quickpoll-data-engineering:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Trivy
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Trivy image scan (data-engineering)
        run: |
          trivy image quickpoll-data-engineering:ci \
            --format sarif \
            --output ${{ github.workspace }}/trivy-data-engineering.sarif \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --exit-code 0

      - name: Upload Trivy SARIF (data-engineering)
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-data-engineering.sarif') != ''
        with:
          sarif_file: ${{ github.workspace }}/trivy-data-engineering.sarif
          category: trivy-image-data-engineering

      - name: Upload Trivy report as artifact (data-engineering)
        uses: actions/upload-artifact@v4
        if: always() && hashFiles('trivy-data-engineering.sarif') != ''
        with:
          name: trivy-data-engineering-report
          path: ${{ github.workspace }}/trivy-data-engineering.sarif
          retention-days: 30

  trufflehog:
    name: TruffleHog - Secrets Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog secrets scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: .
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

  lint-backend:
    name: Lint - Backend (Checkstyle)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run Checkstyle
        run: |
          mvn -f backend/pom.xml checkstyle:check \
            -Dcheckstyle.config.location=google_checks.xml \
            --no-transfer-progress

  lint-frontend:
    name: Lint - Frontend (TypeScript)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix frontend

      - name: TypeScript type check
        working-directory: frontend
        run: npx tsc --noEmit

  lint-data-engineering:
    name: Lint - Data Engineering (Ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: pip install uv

      - name: Ruff lint check
        run: uv run --directory data-engineering ruff check .

      - name: Ruff format check
        run: uv run --directory data-engineering ruff format --check .